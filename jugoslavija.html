<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jugoslavija</title>

    <link rel="stylesheet" href="Jugoslavija.css" />
  </head>

  <body>
    <header>
      <h1>Hrvatska u SFRJ</h1>
      <p>Kraj 2. svijetskog rata</p>
    </header>

    <main>
      <section class="timeline">
        <div class="event" data-id="gaj">
          <h3>Uspostavljanje nove Jugoslavije</h3>

          <img src="slike/kraj.jpg" alt="Zagreb" class="era-image" />
        </div>

        <div class="event" data-id="novine">
          <h3>Odvajanje Jugoslavije i SSSR-a</h3>

          <img
            src="slike/tito-stalin-molotov.jpg"
            alt="Zagreb"
            class="era-image"
          />
        </div>

        <div class="event" data-id="jezik">
          <h3>Market Socijalizam i treći put</h3>

          <img src="slike/kardelj.jpg" alt="Zagreb" class="era-image" />
        </div>

        <div class="event" data-id="1848">
          <h3>Hrvatsko proljeće</h3>

          <img src="slike/poljeće.webp" alt="Zagreb" class="era-image" />
        </div>

        <div class="event" data-id="nagodba">
          <h3>Umro je drug Tito</h3>

          <img
            src="slike/Umro-je-drug-Tito.jpg"
            alt="Zagreb"
            class="era-image"
          />
        </div>

        <div class="event" data-id="kraj">
          <h3>Uspon Miloševića i smrt bratstva i jedinstva</h3>

          <img src="slike/milosevic.jpeg" alt="Zagreb" class="era-image" />
        </div>
      </section>

      <section class="details" id="details">
        <h2>Klikni na događaj</h2>
        <p>Odaberi događaj s lijeve strane za detaljan opis.</p>
      </section>
    </main>

    <script src="jugoslavija.js"></script>
  </body>
</html>
