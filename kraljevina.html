<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kraljevina</title>

    <link rel="stylesheet" href="kraljevina.css" />
  </head>

  <body>
    <header>
      <h1>Hrvatska u Kraljevini Jugoslaviji</h1>
      <p>Prva Jugoslavija 1919-1941.</p>
    </header>

    <main>
      <section class="timeline">
        <div class="event" data-id="gaj">
          <h3>Stvaranje Kraljevine SHS i Radićev govor</h3>

          <img src="slike/shs.jpg" alt="Zagreb" class="era-image" />
        </div>

        <div class="event" data-id="novine">
          <h3>Vidovdanski sustav</h3>

          <img src="slike/USTAV.jpg" alt="Zagreb" class="era-image" />
        </div>

        <div class="event" data-id="jezik">
          <h3>atentat Stjepana Radića</h3>

          <img
            src="slike/umro-radic-768x1024.jpg"
            alt="Zagreb"
            class="era-image"
          />
        </div>

        <div class="event" data-id="1848">
          <h3>Šestosiječanska Diktatura</h3>

          <img
            src="slike/Borba_diktatura_1929.jpg"
            alt="Zagreb"
            class="era-image"
          />
        </div>

        <div class="event" data-id="nagodba">
          <h3>Dogovor Cvetković-Maček</h3>

          <img src="slike/macek.jpg" alt="Zagreb" class="era-image" />
        </div>

        <div class="event" data-id="kraj">
          <h3>Napad na Jugoslaviju 1941.</h3>

          <img
            src="slike/Invasion_of_Yugoslavia_lines_of_attack_Why_We_Fight_no._5.jpg"
            alt="Zagreb"
            class="era-image"
          />
        </div>
      </section>

      <section class="details" id="details">
        <h2>Klikni na događaj</h2>
        <p>Odaberi događaj s lijeve strane za detaljan opis.</p>
      </section>
    </main>

    <script src="kraljevina.js"></script>
  </body>
</html>
